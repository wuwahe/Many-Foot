server:
  port: 8100
spring:
  application:
    name: ManyFoot
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  ai:
    # 以下两段为 Spring AI starter 的自动装配开关，保留兼容（部分 starter 会读它）
    dashscope:
      api-key: 默认占位
    google:
      genai:
        api-key: 默认占位

logging:
  level:
    root: info

# -----------------------------------------------------------------------------
# many-foot.ai: 多厂商 AI 模型配置（由 AiProvidersProperties 绑定）
#
# 结构：
#   providers.<id>: 具体 provider 实例（vendor + model + key 等）
#   roles.<ROLE>:   按 Supervisor 专业智能体角色指定 primary + fallbacks
#   agents.<name>:  按 Agent#getName() 覆盖，优先级高于 roles
#   default:        全局兜底 provider id
#
# 扩展新厂商：绝大多数 OpenAI 兼容厂商（Kimi/智谱/SiliconFlow/OpenRouter/
#   Together/Groq/vLLM/DeepSeek /v1 等）只需新增一个 vendor: openai-compatible
#   的 provider，无需改 Java 代码。
# -----------------------------------------------------------------------------
many-foot:
  skills:
    enabled: true
  ai:
    providers:
      supervisor:
        vendor: openai-compatible
        model: mimo-v2.5-pro
        api-key: ${MANY_FOOT_API_KEY:}
        base-url: ${MANY_FOOT_BASE_URL:}
        options:
          temperature: 0.7
          # 关闭模型的 thinking / reasoning 模式，避免多轮对话时因 reasoning_content 未回传而报错
          extra-body:
            enable_thinking: false
            chat_template_kwargs:
              enable_thinking: false
              thinking: false
      coder:
        vendor: openai-compatible
        model: mimo-v2.5-pro
        api-key: ${MANY_FOOT_API_KEY:}
        base-url: ${MANY_FOOT_BASE_URL:}
        options:
          extra-body:
            enable_thinking: false
            chat_template_kwargs:
              enable_thinking: false
              thinking: false
      fast:
        vendor: openai-compatible
        model: mimo-v2.5
        api-key: ${MANY_FOOT_API_KEY:}
        base-url: ${MANY_FOOT_BASE_URL:}
        multimodal: true
        options:
          extra-body:
            enable_thinking: false
            chat_template_kwargs:
              enable_thinking: false
              thinking: false
      backup:
        vendor: openai-compatible
        model: mimo-v2.5-pro
        api-key: ${MANY_FOOT_API_KEY:}
        base-url: ${MANY_FOOT_BASE_URL:}
        options:
          extra-body:
            enable_thinking: false
            chat_template_kwargs:
              enable_thinking: false
              thinking: false
    #      # 其它厂商示例（按需解开注释并填 key）
    #      gpt-4o:
    #        vendor: openai
    #        model: gpt-4o
    #        api-key: ${OPENAI_KEY}
    #      kimi:
    #        vendor: openai-compatible
    #        model: moonshot-v1-32k
    #        api-key: ${MOONSHOT_KEY}
    #        base-url: https://api.moonshot.cn/v1
    #      zhipu-glm4:
    #        vendor: openai-compatible
    #        model: glm-4-plus
    #        api-key: ${ZHIPU_KEY}
    #        base-url: https://open.bigmodel.cn/api/paas/v4
    #      gemini-pro:
    #        vendor: gemini
    #        model: gemini-2.5-pro
    #        api-key: ${GEMINI_KEY}
    #      claude-sonnet:
    #        vendor: anthropic
    #        model: claude-sonnet-4
    #        api-key: ${ANTHROPIC_KEY}
    #      ollama-local:
    #        vendor: ollama
    #        model: qwen2.5:14b
    #        base-url: http://localhost:11434

    roles:
      SUPERVISOR:
          primary: supervisor
          fallbacks: [backup]
      PLANNER_ROUTER:
        primary: supervisor
        fallbacks: [backup]
      RESEARCH_RETRIEVAL:
        primary: fast
        fallbacks: [backup]
      DOMAIN_SPECIALIST:
        primary: fast
        fallbacks: [backup]
      TOOL_ACTION_EXECUTOR:
        primary: coder
        fallbacks: [backup]
      CODE:
        primary: coder
        fallbacks: [backup]
      CHAT:
        primary: fast
        fallbacks: [backup]
    #    agents:
    #      Tool_Action_Executor_agent:
    #        role: TOOL_ACTION_EXECUTOR
    #        primary: qwen3-coder
    #        fallbacks: [qwen-max]

    default-provider: fast
  # ---- 执行进度跟踪配置 ----
  # 控制智能体执行过程中的进度快照持久化行为
  #execution:
  #  # 是否启用执行跟踪功能
  #  enabled: true
  #  # Redis 快照 TTL（小时），超过该时长后自动清除
  #  redis-ttl-hours: 24
  #  # Redis key 前缀，所有执行进度快照均以此前缀开头
  #  redis-key-prefix: "manyfoot:execution"
  #  # 单次执行最大步骤数（防溢出）
  #  max-steps-per-execution: 50

  search:
    enabled: true
    brave:
      api-key: ${BRAVE_SEARCH_API_KEY:}
      base-url: https://api.search.brave.com/res/v1/web/search
      default-count: 5
      max-count: 10
      timeout-seconds: 15
      max-retries: 3
    jina:
      api-key: ${JINA_API_KEY:}
      reader-url: https://r.jina.ai/
      search-url: https://s.jina.ai/
      timeout-seconds: 30
      stream-timeout-seconds: 60
    extraction:
      max-concurrency: 3
      max-content-chars: 12000
    cache:
      enabled: true
    rate-limit:
      enabled: true
      max-searches-per-session: 5
      max-extractions-per-session: 10

  sandbox: # 是否启用沙箱功能
    enabled: true
    # Docker 镜像名称
    image-name: sandbox-image:1.0
    # 容器内存限制 (MB)
    memory-limit: 256
    # CPU 限制 (核心数)
    cpu-limit: 1.0
    # 单次执行超时时间 (秒)
    execution-timeout: 300
    # 容器空闲超时时间 (分钟)
    idle-timeout: 10
    # 最大并发容器数
    max-containers: 10
    # 宿主机工作目录基础路径
    host-workspace-path: /tmp/many-foot-sandbox
    # 网络模式 (none/bridge/host)
    network-mode: host
    # 是否启用网络访问
    network-enabled: true
    # Docker 主机地址
    # Windows Docker Desktop: npipe:////./pipe/docker_engine
    # Windows TCP (需在Docker Desktop设置中启用): tcp://localhost:2375
    # Linux: unix:///var/run/docker.sock
    docker-host: ${MANY_FOOT_DOCKER_HOST:tcp://localhost:2375}
    # Python 执行器路径
    # /usr/local/bin/python
    python-path: /usr/bin/python
    # Shell 执行器路径
    shell-path: /bin/bash

spring.data:
  redis:
    # 地址
    host: ${REDIS_HOST:localhost}
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 1
    # redis 密码必须配置
    password: ${REDIS_PASSWORD:}
    # 连接超时时间
    timeout: 10s
    # 是否开启ssl
    ssl.enabled: false
